version: '3.8'

services:

  # --- PRODUCTION STORAGE BOUNDARY ---
  minio:
    image: minio/minio:latest
    container_name: reinsurance_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: always

  # --- ENHANCED POSTGRESQL METADATA TRANSACTION NODES ---
  postgres:
    image: postgres:15-alpine
    container_name: reinsurance_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d
    restart: always

  # --- CLIENT MAP FRONTEND USER INTERFACE ---
  mapping-ui:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: mapping_ui
    ports:
      - "5050:5000"
    depends_on:
      - postgres
    restart: always

  # --- DISTRIBUTED ENGINE WORKER CORES ---
  spark-master:
    image: docker.io/bitnamilegacy/spark:3.5.1
    container_name: spark_master
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/data
      - ./dags:/opt/airflow/dags
    restart: always

  spark-worker:
    image: docker.io/bitnamilegacy/spark:3.5.1
    container_name: spark_worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./data:/data
      - ./dags:/opt/airflow/dags
    restart: always

  # --- JUPYTER DEVELOPMENT BOUNDARIES ---
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: reinsurance_lab
    user: root
    ports:
      - "8889:8888"
    volumes:
      - .:/home/jovyan/work
      - ./jars:/home/jovyan/jars
      - ./data:/data
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master:7077
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - PYSPARK_SUBMIT_ARGS=--jars /home/jovyan/jars/hadoop-aws-3.3.4.jar,/home/jovyan/jars/aws-java-sdk-bundle-1.12.262.jar,/home/jovyan/jars/postgresql-42.7.3.jar pyspark-shell
    command: start-notebook.sh --NotebookApp.token=''
    restart: always

  # --- AUTOMATED DATABASE SCHEMA INSTANTIATOR ---
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      - postgres
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create \
        --username admin \
        --password admin \
        --firstname admin \
        --lastname user \
        --role Admin \
        --email admin@example.com
      "

  # --- WORKFLOW WEB INTERFACE ENGINE ---
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: reinsurance_airflow
    depends_on:
      - airflow-init
      - postgres
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__BASE_URL=http://localhost:8081
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/data
      - ./logs:/opt/airflow/logs
      - ./jars:/opt/airflow/jars
      - ./data_receipt:/opt/airflow/data_receipt 
    ports:
      - "8081:8080"
    command: webserver
    restart: always

  # --- AIRFLOW CORE EXECUTION SCHEDULER ---
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__SMTP__SMTP_HOST=smtp.gmail.com
      - AIRFLOW__SMTP__SMTP_STARTTLS=True
      - AIRFLOW__SMTP__SMTP_SSL=False
      - AIRFLOW__SMTP__SMTP_USER=harshitj341@gmail.com
      - AIRFLOW__SMTP__SMTP_PASSWORD=${SMTP_PASSWORD}
      - AIRFLOW__SMTP__SMTP_PORT=587
      - AIRFLOW__SMTP__SMTP_MAIL_FROM=harshitj341@gmail.com
      - AIRFLOW__WEBSERVER__BASE_URL=http://localhost:8081
      - AIRFLOW__CORE__HOSTNAME_CALLABLE=socket:gethostname
      - AIRFLOW__LOGGING__REMOTE_LOGGING=False
      - PLATFORM_UI_BASE_URL=http://localhost:5050
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/data
      - ./logs:/opt/airflow/logs
      - ./jars:/opt/airflow/jars
      - ./data_receipt:/opt/airflow/data_receipt 
    command: scheduler
    restart: always

volumes:
  postgres_data: